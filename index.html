<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeafLedger Pro | Tea Management</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="loginOverlay" class="animate__animated animate__fadeIn">
        <div class="card" style="width: 85%; text-align: center;">
            <h2 class="neon-text">🍃 LEAFLEDGER PRO</h2>
            <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 20px;">SECURE ADMIN ACCESS</p>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="mainApp" class="container" style="display: none;">
        <header class="animate__animated animate__slideInDown">
            <h2 id="displayBusinessName">LeafLedger Hub</h2>
            <div class="flex-row">
                <input type="date" id="dateFilter">
            </div>
        </header>

        <div class="card animate__animated animate__fadeInUp">
            <h3>📈 Production Trend</h3>
            <canvas id="productionChart" height="180"></canvas>
        </div>

        <div class="stat-grid">
            <div class="stat-box animate__animated animate__zoomIn">
                <small>DAY TOTAL</small>
                <div id="dayTotalKg">0 kg</div>
            </div>
            <div class="stat-box animate__animated animate__zoomIn" style="animation-delay: 0.1s;">
                <small>EST. VALUE</small>
                <div id="dayTotalValue">Ksh 0</div>
            </div>
        </div>

        <div class="card animate__animated animate__fadeInLeft">
            <h3>📝 Slip Digitization</h3>
            <form id="recordForm">
                <label>Select Farmer</label>
                <select id="farmerSelect" required></select>
                <label>Weight from Physical Slip</label>
                <input type="number" id="kgInput" step="0.1" placeholder="Enter KG" required>
                <button type="submit" class="btn-primary">SECURE RECORD</button>
            </form>
        </div>

        <div class="card" id="dailyPrintArea">
            <h3>📋 Daily Ledger</h3>
            <table id="dailyTable">
                <thead>
                    <tr><th>Farmer</th><th>KG</th><th>Time</th><th>Action</th></tr>
                </thead>
                <tbody id="dailyLogBody"></tbody>
            </table>
            <button id="downloadDailyBtn" class="btn-primary" style="margin-top: 15px; background: #333; border-color: #555;">📸 SAVE SNAPSHOT</button>
        </div>

        <div class="card">
            <h3>⚙️ System Settings</h3>
            <label>Business Display Name</label>
            <input type="text" id="businessNameInput" placeholder="e.g., Kibet Tea Point">
            <label>Market Rate (Ksh/KG)</label>
            <input type="number" id="priceSetting" step="0.1">
            <button onclick="saveSettings()" class="btn-primary">UPDATE SYSTEM</button>
            <button onclick="exportToExcel()" class="btn-primary" style="margin-top: 12px; background: #1b5e20; border-color: #2e7d32;">📥 EXPORT EXCEL (CSV)</button>
        </div>

        <button onclick="handleLogout()" style="width:100%; background:transparent; border:none; color:#ff4d4d; margin-top:20px; font-weight:bold; cursor:pointer;">Terminate Session</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
