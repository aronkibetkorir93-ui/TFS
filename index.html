<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Farming Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay" class="overlay">
        <div class="card">
            <h2>Tea System Login</h2>
            <input type="email" id="email" placeholder="Email (Mum's Email)">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()" class="btn-primary">Login</button>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <header>
            <h1>Tea Farming Hub</h1>
            <button onclick="handleLogout()" class="btn-logout">Logout</button>
        </header>

        <div class="card">
            <h3>Register New Farmer</h3>
            <div class="flex-row">
                <input type="text" id="newFarmerName" placeholder="Enter Full Name">
                <button onclick="addNewFarmer()" class="btn-primary" style="width: auto;">Add</button>
            </div>
        </div>

        <div class="card">
            <h3>Record Daily Delivery</h3>
            <form id="recordForm">
                <select id="farmerSelect" required><option value="">Select Farmer</option></select>
                <input type="number" id="kgInput" step="0.1" placeholder="Enter KG Collected" required>
                <button type="submit" class="btn-primary">Save Record</button>
            </form>
        </div>

        <div class="card" id="printArea">
            <h3 style="margin-bottom: 5px;">Monthly Earnings Report</h3>
            <p id="currentMonthLabel" style="text-align: center; font-weight: bold; color: #2d5a27; margin-top: 0;"></p>
            <table>
                <thead>
                    <tr><th>Farmer</th><th>Total KG</th><th>Payable (Ksh)</th></tr>
                </thead>
                <tbody id="earningsBody"></tbody>
            </table>
            <p style="font-size: 10px; color: #888; text-align: center; margin-top: 15px;">Generated by Tea Management System</p>
        </div>
        
        <div style="text-align: center; margin-bottom: 40px;">
            <button id="downloadBtn" class="btn-secondary">Download Report as Image</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
