<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay" class="overlay">
        <div class="card">
            <h2>Mum's Tea System</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()" class="btn-primary">Login</button>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <header>
            <h1>Tea Farming Management</h1>
            <button onclick="handleLogout()" class="btn-logout">Logout</button>
        </header>

        <div class="card">
            <h3>Register New Farmer</h3>
            <div class="flex-row">
                <input type="text" id="newFarmerName" placeholder="Full Name">
                <button onclick="addNewFarmer()" class="btn-primary" style="width: auto;">Add</button>
            </div>
        </div>

        <div class="card">
            <h3>Daily KG Entry</h3>
            <form id="recordForm">
                <select id="farmerSelect" required><option value="">Select Farmer</option></select>
                <input type="number" id="kgInput" step="0.1" placeholder="Enter KG" required>
                <button type="submit" class="btn-primary">Save Record</button>
            </form>
        </div>

        <div class="card">
            <h3>Manage & Edit</h3>
            <ul id="manageFarmersList" class="manage-list"></ul>
        </div>

        <div class="card" id="printArea">
            <h3 id="reportTitle">Monthly Earnings</h3>
            <p id="currentMonthLabel" class="month-label"></p>
            <table>
                <thead><tr><th>Farmer</th><th>Total KG</th><th>Payable (Ksh)</th></tr></thead>
                <tbody id="earningsBody"></tbody>
            </table>
        </div>
        
        <div style="text-align: center; margin-bottom: 40px;">
            <button id="downloadBtn" class="btn-secondary">Download as Image</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
