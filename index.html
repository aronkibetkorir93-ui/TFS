<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mama Tea Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="loginOverlay">
        <div class="auth-card">
            <h2 class="neon-text">MAMA TEA HUB</h2>
            <p style="color: #666; font-size: 11px; margin-bottom: 20px;">ENCRYPTED ACCESS</p>
            <input type="password" id="pinInput" placeholder="****" maxlength="4" inputmode="numeric">
            <button class="btn-primary" onclick="checkPin()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="mainApp" class="container" style="display: none;">
        <header>
            <h2 class="neon-text" style="text-align: center;">MAMA TEA HUB</h2>
            <div class="tab-group">
                <div class="tab active" onclick="switchTab(event, 'daily')">DAILY</div>
                <div class="tab" onclick="switchTab(event, 'monthly')">MONTHLY</div>
                <div class="tab" onclick="switchTab(event, 'farmers')">FARMERS</div>
            </div>
        </header>

        <div id="dailySection" class="section-content">
            <div class="card">
                <h3>📝 Record Entry</h3>
                <label>Select Farmer</label>
                <select id="farmerSelect"></select>
                <label>Weight (KG)</label>
                <input type="number" id="kgInput" step="0.1" placeholder="0.0">
                <label>Date</label>
                <input type="date" id="dateFilter">
                <button class="btn-primary" onclick="saveRecord()">SECURE TO CLOUD</button>
            </div>

            <div class="card">
                <h3>📋 Daily Ledger</h3>
                <button class="btn-primary" onclick="downloadAsImage('dailySection', 'Daily_Report')">📸 DOWNLOAD DAILY IMAGE</button>
                
                <table>
                    <thead><tr><th>Farmer</th><th>KG</th><th>Action</th></tr></thead>
                    <tbody id="dailyLogBody"></tbody>
                </table>
            </div>
        </div>

        <div id="monthlySection" class="section-content" style="display:none;">
            <div class="card">
                <h3>💰 Monthly Payouts</h3>
                <button class="btn-primary" onclick="downloadAsImage('monthlySection', 'Monthly_Report')">📸 DOWNLOAD MONTHLY IMAGE</button>
                
                <select id="monthSelect" onchange="loadMonthlySummary()"></select>
                <table>
                    <thead><tr><th>Farmer</th><th>Total KG</th><th>Earnings</th></tr></thead>
                    <tbody id="monthlyBody"></tbody>
                </table>
            </div>
        </div>

        <div id="farmersSection" class="section-content" style="display:none;">
            <div class="card">
                <h3>➕ Register Farmer</h3>
                <input type="text" id="newFarmerName" placeholder="Full Name">
                <button class="btn-primary" onclick="addNewFarmer()">ADD TO DATABASE</button>
            </div>
            <div id="farmerList"></div>
        </div>

        <button onclick="location.reload()" class="btn-logout">TERMINATE SESSION</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    

    <script src="script.js"></script>
</body>
</html>
